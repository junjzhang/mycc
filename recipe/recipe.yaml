context:
  name: mycc
  version: ${{ env.get("MYCC_VERSION") }}

package:
  name: "${{ name }}${{ '-full' if variant == 'full' else '' }}"
  version: "${{ version }}"

source:
  # Use local source directory
  path: ..

build:
  number: 0
  noarch: python
  script: |
    pip install . --no-deps --ignore-installed -vvv
  python:
    entry_points:
      - mycc = mycc.cli:main

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=3.10
    - tyro >=0.8.0
    - pydantic >=2.0.0
    - colorama >=0.4.4

tests:
  - script:
      - mycc --help
      - mycc version
  - python:
      imports:
        - mycc
        - mycc.cli
        - mycc.config
        - mycc.manager
        - mycc.modules.deps
        - mycc.modules.claude_user_setting

about:
  summary: A modular Claude Code configuration manager
  description: |
    MYCC is a modular configuration manager for Claude Code that helps you manage
    commands, configurations, and MCP servers. This basic version includes core
    functionality only - external dependencies (Claude Code, ccstatusline, TweakCC, 
    ccusage) need to be installed separately.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/junjzhang/mycc
  repository: https://github.com/junjzhang/mycc.git
  documentation: https://github.com/junjzhang/mycc#readme

extra:
  recipe-maintainers:
    - junjzhang