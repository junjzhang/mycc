[project]
name = "mycc"
# Version is managed by hatch-vcs from Git tags
description = "A modular Claude Code configuration manager"
authors = ["junjzhang <junjzhang@example.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks]
# Development tasks
test = "pytest"
lint = "ruff check mycc"
format = "ruff format mycc"

# Testing tasks 
integration-test = "pytest tests/test_integration.py -v"
unit-test = "pytest tests/test_modules.py -v"

# Package building tasks using hatch version + rattler-build
build = "MYCC_VERSION=$(pixi run -e build hatch version) rattler-build build --recipe recipe/recipe.yaml --output-dir ./output"
clean-build = "rm -rf ./output"

# Package upload tasks
upload = "python scripts/upload.py"

[dependencies]
python = ">=3.10"
tyro = ">=0.8.0"
pydantic = ">=2.0.0"
colorama = ">=0.4.4"

[pypi-dependencies]
mycc = {path='.', editable = true}

[feature.dev.dependencies]
pip = "*"
pytest = ">=7.0.0"
ruff = ">=0.1.0"
pre-commit = ">=4.3.0,<5"
tqdm = ">=4.67.1,<5"

[feature.build.dependencies]
hatch = "*"
hatch-vcs = "*"
rattler-build = "*"
pixi-build-rattler-build = "*"

[environments]
default = []
dev = { features = ["dev"] }
build = { features = ["build"] }
