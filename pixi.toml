[project]
name = "mycc"
# Version is managed by setuptools-scm from Git tags
description = "A modular Claude Code configuration manager"
authors = ["junjzhang <junjzhang@example.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks]
install = "python -m mycc install --all"
uninstall = "python -m mycc uninstall --all"
install-commands = "python -m mycc install --modules commands"
install-configs = "python -m mycc install --modules configs"
link-configs = "python -m mycc link"
status = "python -m mycc status"
list = "python -m mycc list"

# Dependency management
deps = "python -m mycc deps"
deps-install = "python -m mycc deps --install"

# Development tasks
dev-install = "pip install -e ."
test = "pytest"
lint = "ruff check mycc"
format = "ruff format mycc"

# Test mode tasks (safe for development)
dev-test = """
    echo "🧪 Running comprehensive MYCC test suite..." &&
    python -m mycc deps --test-mode &&
    python -m mycc install --all --test-mode &&
    python -m mycc status --test-mode &&
    python -m mycc list --test-mode &&
    python -m mycc link --test-mode &&
    python -m mycc uninstall --all --test-mode &&
    echo "🧹 Cleaning up test directories..." &&
    rm -rf .test_claude .test_home &&
    echo "✅ All tests completed successfully!"
"""
test-clean = "rm -rf .test_claude .test_home"

# Package building tasks  
build-basic = "rattler-build build --recipe recipe/recipe.yaml --output-dir ./output"
build-full = "rattler-build build --recipe recipe/recipe-full.yaml --output-dir ./output"
build-all = "rattler-build build --recipe recipe/recipe.yaml --output-dir ./output && rattler-build build --recipe recipe/recipe-full.yaml --output-dir ./output"
clean-build = "rm -rf ./output"

# Package upload tasks
upload = "python scripts/upload.py --type all"
upload-basic = "python scripts/upload.py --type basic"  
upload-full = "python scripts/upload.py --type full"

[dependencies]
python = ">=3.10"
tyro = ">=0.8.0"
pydantic = ">=2.0.0"
colorama = ">=0.4.4"
tomli = ">=1.2.0"
[feature.dev.dependencies]
pip = "*"
pytest = ">=7.0.0"
ruff = ">=0.1.0"
pre-commit = ">=4.3.0,<5"
tqdm = ">=4.67.1,<5"

[feature.build.dependencies]
rattler-build = "*"

[environments]
default = []
dev = { features = ["dev"] }
build = { features = ["build"] }
